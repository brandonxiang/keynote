<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Brandon Xiang 的前端工程、架构、PWA、微前端和研发效率主题技术分享合集。" />
    <meta name="keywords" content="Brandon Xiang, Keynote, 前端工程, PWA, 微前端, 架构" />
    <meta name="author" content="Brandon Xiang" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#fdf8ea" />
    <meta property="og:title" content="{{pageTitle}}" />
    <meta property="og:description" content="Brandon Xiang 的前端工程、架构、PWA、微前端和研发效率主题技术分享合集。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://keynote.brandonxiang.top">
    <meta property="og:site_name" content="{{pageTitle}}">
    <meta property="og:image" content="https://keynote.brandonxiang.top/public/img/poster.png">
    <meta property="twitter:image" content="https://keynote.brandonxiang.top/public/img/poster.png">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="{{pageTitle}}" />
    <meta property="twitter:description" content="Brandon Xiang 的前端工程、架构、PWA、微前端和研发效率主题技术分享合集。" />
    <title>{{pageTitle}}</title>
    <link rel="canonical" href="https://keynote.brandonxiang.top/" />
    <link rel="shortcut icon" href="favicon.ico" />
    <script>
      (function () {
        if (location.hostname !== 'keynote.brandonxiang.top') return;

        window.dataLayer = window.dataLayer || [];
        window.gtag = function () {
          window.dataLayer.push(arguments);
        };

        var gtagScript = document.createElement('script');
        gtagScript.async = true;
        gtagScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-XJN1EG3C62';
        document.head.appendChild(gtagScript);

        window.gtag('js', new Date());
        window.gtag('config', 'G-XJN1EG3C62');
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --ink: #123332;
        --muted: #5d716d;
        --paper: #fdf8ea;
        --canvas: #f5f0e5;
        --accent: #1f9d8a;
        --gold: #e6a13a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: var(--canvas);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .listing-shell {
        width: min(1040px, calc(100% - 40px));
        margin: 0 auto;
        padding: 42px 0 56px;
      }

      .listing-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
      }

      .listing-brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        color: inherit;
        text-decoration: none;
      }

      .listing-brand svg {
        width: 52px;
        height: 52px;
        flex: 0 0 auto;
        filter: drop-shadow(0 12px 22px rgba(18, 51, 50, 0.14));
      }

      .listing-brand span {
        display: block;
      }

      .listing-brand__title {
        font-size: clamp(30px, 4vw, 48px);
        font-weight: 800;
        line-height: 0.96;
        letter-spacing: -0.022em;
        text-wrap: balance;
      }

      .listing-brand__subtitle {
        margin-top: 7px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
      }

      .listing-updated {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-style: normal;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }
      li {
        border-radius: 8px;
        background-color: var(--paper);
        box-shadow: 0 1px 3px rgba(22, 31, 36, 0.11), inset 0 0 0 1px rgba(18, 51, 50, 0.06);
        transition: transform 160ms cubic-bezier(0.16, 1, 0.3, 1), box-shadow 160ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      a {
        text-decoration: none;
        color: var(--ink);
        display: block;
        padding: 15px 16px;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.4;
        text-wrap: pretty;
      }

      a:focus-visible {
        outline: 3px solid rgba(31, 157, 138, 0.35);
        outline-offset: 3px;
      }

      @media (hover: hover) {
        li:hover {
          transform: translateY(-1px);
          box-shadow: 0 12px 26px rgba(22, 31, 36, 0.12), inset 0 0 0 1px rgba(31, 157, 138, 0.16);
        }
      }

      @media (max-width: 640px) {
        .listing-shell {
          width: min(100% - 24px, 1040px);
          padding-top: 24px;
        }

        .listing-header {
          display: grid;
          gap: 12px;
        }

        .listing-updated {
          text-align: left;
        }
      }
    </style>
  </head>

  <body>
    <main class="listing-shell">
      <header class="listing-header">
        <a class="listing-brand" href="https://brandonxiang.top/keynote">
          <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <rect x="6" y="8" width="52" height="48" rx="14" fill="#123332" />
            <path d="M18 18h28c2.2 0 4 1.8 4 4v18c0 2.2-1.8 4-4 4H18c-2.2 0-4-1.8-4-4V22c0-2.2 1.8-4 4-4Z" fill="#FDF8EA" />
            <path d="M24 24v16M24 32l13-8M24 32l14 8" fill="none" stroke="#123332" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M42 22h4M42 30h4M42 38h4" stroke="#1F9D8A" stroke-width="3" stroke-linecap="round" />
            <path d="M20 49h24" stroke="#E6A13A" stroke-width="4" stroke-linecap="round" />
          </svg>
          <span>
            <span class="listing-brand__title">Keynote</span>
            <span class="listing-brand__subtitle">Curated front-end engineering talks</span>
          </span>
        </a>
        <p class="listing-updated">Last update: {{date}}</p>
      </header>

      <ul>
        {{#files}}
        <li>
          <a href="{{filePath}}" title="{{title}}">
            {{#title}}
              {{.}} ({{filePath}})
            {{/title}}
            {{^title}}
              {{filePath}}
            {{/title}}
          </a>
        </li>
        {{/files}}
      </ul>
    </main>
  </body>
</html>
