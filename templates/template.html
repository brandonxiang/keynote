<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>{{{title}}}</title>
    {{#absoluteUrl}}
    <meta property="og:title" content="{{{title}}}" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://keynote.brandonxiang.top/public/img/poster.png">
    <meta property="og:url" content="{{{absoluteUrl}}}" />
    {{/absoluteUrl}}
    <link rel="shortcut icon" href="{{{base}}}/favicon.ico" />
    <link rel="stylesheet" href="{{{base}}}/dist/reset.css" />
    <link rel="stylesheet" href="{{{base}}}/dist/reveal.css" />
    <link rel="stylesheet" href="{{{themeUrl}}}" id="theme" />
    <link rel="stylesheet" href="{{{base}}}{{{highlightThemeUrl}}}" />
    <style>
      .keynote-brand {
        position: fixed;
        z-index: 30;
        top: 18px;
        left: 22px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 40px;
        padding: 8px 10px 8px 8px;
        border-radius: 14px;
        color: #123332;
        font: 700 14px/1.1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: -0.012em;
        text-decoration: none;
        background: rgba(253, 250, 242, 0.86);
        box-shadow: 0 10px 28px rgba(22, 31, 36, 0.12), inset 0 0 0 1px rgba(18, 51, 50, 0.08);
        transition: transform 160ms cubic-bezier(0.16, 1, 0.3, 1), box-shadow 160ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      .keynote-brand svg {
        display: block;
        width: 34px;
        height: 34px;
      }

      .keynote-brand__text {
        display: grid;
        gap: 2px;
      }

      .keynote-brand__label {
        color: #123332;
      }

      .keynote-brand__meta {
        color: #5d716d;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .keynote-brand:focus-visible {
        outline: 3px solid rgba(31, 157, 138, 0.36);
        outline-offset: 3px;
      }

      .keynote-brand:active {
        transform: scale(0.96);
      }

      @media (hover: hover) {
        .keynote-brand:hover {
          transform: translateY(-1px);
          box-shadow: 0 14px 32px rgba(22, 31, 36, 0.16), inset 0 0 0 1px rgba(18, 51, 50, 0.1);
        }
      }

      @media (max-width: 720px) {
        .keynote-brand {
          top: 10px;
          left: 10px;
          padding-right: 8px;
        }

        .keynote-brand__text {
          display: none;
        }
      }
    </style>

    {{#cssPaths}}
    <link rel="stylesheet" href="{{{.}}}" />
    {{/cssPaths}} {{#watch}}

    <script>
      document.write(
        '<script src="http://' +
          (location.host || 'localhost').split(':')[0] +
          ':35729/livereload.js?snipver=1"></' +
          'script>'
      );
    </script>
    {{/watch}}
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XJN1EG3C62"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-XJN1EG3C62');
    </script>
  </head>
  <body>
    <a class="keynote-brand" href="https://brandonxiang.top/keynote" aria-label="Brandon Keynote home">
      <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
        <rect x="6" y="8" width="52" height="48" rx="14" fill="#123332" />
        <path d="M18 18h28c2.2 0 4 1.8 4 4v18c0 2.2-1.8 4-4 4H18c-2.2 0-4-1.8-4-4V22c0-2.2 1.8-4 4-4Z" fill="#FDF8EA" />
        <path d="M24 24v16M24 32l13-8M24 32l14 8" fill="none" stroke="#123332" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M42 22h4M42 30h4M42 38h4" stroke="#1F9D8A" stroke-width="3" stroke-linecap="round" />
        <path d="M20 49h24" stroke="#E6A13A" stroke-width="4" stroke-linecap="round" />
      </svg>
      <span class="keynote-brand__text" aria-hidden="true">
        <span class="keynote-brand__label">Keynote</span>
        <span class="keynote-brand__meta">Tech talks</span>
      </span>
    </a>
    <div class="reveal">
      <div class="slides">
        <section data-markdown {{{slidifyAttributes}}}>
          <textarea data-template>
            {{{markdown}}}
          </textarea>
        </section>
      </div>
    </div>

    <script src="{{{base}}}/dist/reveal.js"></script>

    {{#mermaidOptionsStr}}
    <script src="{{{base}}}/mermaid/dist/mermaid.min.js"></script>
    {{/mermaidOptionsStr}}

    <script src="{{{base}}}/plugin/markdown/markdown.js"></script>
    <script src="{{{base}}}/plugin/highlight/highlight.js"></script>
    <script src="{{{base}}}/plugin/zoom/zoom.js"></script>
    <script src="{{{base}}}/plugin/notes/notes.js"></script>
    <script src="{{{base}}}/plugin/math/math.js"></script>
    <script>
      function extend() {
        var target = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i];
          for (var key in source) {
            if (source.hasOwnProperty(key)) {
              target[key] = source[key];
            }
          }
        }
        return target;
      }

      // default options to init reveal.js
      var defaultOptions = {
        controls: true,
        progress: true,
        history: true,
        center: true,
        transition: 'default', // none/fade/slide/convex/concave/zoom
        slideNumber: true,
        highlight: {
          highlightOnLoad: false
        },
        plugins: [
          RevealMarkdown,
          RevealHighlight,
          RevealZoom,
          RevealNotes,
          RevealMath
        ]
      };

      // options from URL query string
      var queryOptions = Reveal().getQueryHash() || {};

      var options = extend(defaultOptions, {{{revealOptionsStr}}}, queryOptions);
    </script>

    {{#scriptPaths}}
    <script src="{{{.}}}"></script>
    {{/scriptPaths}}

    <script>
      Reveal.initialize(options);
      Reveal.addEventListener('ready', function (event) {
        const blocks = Reveal.getRevealElement().querySelectorAll('pre code:not(.mermaid)');
        const hlp = Reveal.getPlugin('highlight');
        blocks.forEach(hlp.highlightBlock);
      });
    </script>

    {{#mermaidOptionsStr}}
    <script>
      const mermaidOptions = extend({ startOnLoad: false }, {{{mermaidOptionsStr}}});
      mermaid.startOnLoad = false;
      mermaid.initialize(mermaidOptions);
      const cb = function (event) {
        mermaid.init(mermaidOptions, '.stack.present > .present pre code.mermaid');
        mermaid.init(mermaidOptions, '.slides > .present:not(.stack) pre code.mermaid');
      }
      Reveal.addEventListener('ready', cb);
      Reveal.addEventListener('slidetransitionend', cb);
    </script>
    {{/mermaidOptionsStr}}
  </body>
</html>
